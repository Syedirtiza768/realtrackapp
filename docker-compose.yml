# ───────────────────────────────────────────────────────────────
# RealTrackApp — Docker Compose
# ───────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env          # fill in your secrets
#   docker compose up -d --build  # build & start all services
#   docker compose logs -f        # follow logs
# ───────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-listingpro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-listingpro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Use compose `environment` only; do not read a host .env file in the container
      IGNORE_ENV_FILE: "true"
      PORT: 4191
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-listingpro}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-false}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      DB_LOGGING: ${DB_LOGGING:-false}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      # Pipeline project root (scripts, output, env files)
      PIPELINE_PROJECT_ROOT: /app
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8050,https://mhn.realtrackapp.com,http://mhn.realtrackapp.com}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # eBay
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_DEV_ID: ${EBAY_DEV_ID:-}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-SANDBOX}
      EBAY_REDIRECT_URI: ${EBAY_REDIRECT_URI:-}
      # S3 / Storage (s3://solarrisebackupbucket/mhn/ — set bucket + prefix in .env)
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-${S3_BUCKET:-}}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-${S3_PREFIX:-}}
      AWS_S3_REGION: ${AWS_S3_REGION:-${S3_REGION:-us-east-1}}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads:/app/uploads
      - ./scripts:/app/scripts:ro
      - ./output:/app/output
      # Optional: add your own env file (must be a real file, not a directory):
      #   - ./.env:/app/.env:ro
      - ./eBay-parts-and-accs-listing-template-Mar-28-2026-19-33-14.xlsx:/app/eBay-parts-and-accs-listing-template-Mar-28-2026-19-33-14.xlsx:ro
      - ./eBay-category-listing-template-Mar-28-2026-19-39-50.xlsx:/app/eBay-category-listing-template-Mar-28-2026-19-39-50.xlsx:ro
      - ./eBay-category-listing-template-Mar-28-2026-19-43-18.xlsx:/app/eBay-category-listing-template-Mar-28-2026-19-43-18.xlsx:ro
    ports:
      - "${BACKEND_PORT_EXTERNAL:-4191}:4191"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4191/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── Vite Frontend → Nginx ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8050}:80"

volumes:
  pgdata:
  redisdata:
  uploads:
