# ───────────────────────────────────────────────────────────────
# RealTrackApp — Docker Compose
# ───────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env          # fill in your secrets
#   docker compose up -d --build  # build & start all services
#   docker compose logs -f        # follow logs
# ───────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # t3.medium (4 GB): cap Postgres ~512 MB shared_buffers budget
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
    environment:
      POSTGRES_DB: ${DB_NAME:-listingpro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./listingpro.dump:/seed/listingpro.dump:ro
      - ./docker/postgres/init/01-restore-listingpro.sh:/docker-entrypoint-initdb.d/01-restore-listingpro.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-listingpro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Catalog CSV import loads the full file into JS heap (see CsvImportProcessor); default ~2GB OOMs on large files
      # Prefer IPv4 for outbound HTTPS (Docker Desktop IPv6 to OpenRouter often ETIMEDOUT)
      NODE_OPTIONS: "${NODE_OPTIONS:---max-old-space-size=1536 --dns-result-order=ipv4first --no-network-family-autoselection}"
      # Use compose `environment` only; do not read a host .env file in the container
      IGNORE_ENV_FILE: "true"
      PORT: 4191
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-listingpro}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-false}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-true}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_LOGGING: ${DB_LOGGING:-false}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-14400}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      # Demo user seeding (enabled by default; set false to disable)
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-true}
      DEFAULT_SUPER_ADMIN_EMAIL: ${DEFAULT_SUPER_ADMIN_EMAIL:-admin@realtrack.local}
      DEFAULT_SUPER_ADMIN_PASSWORD: ${DEFAULT_SUPER_ADMIN_PASSWORD:?DEFAULT_SUPER_ADMIN_PASSWORD is required}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-}
      DEFAULT_MANAGER_PASSWORD: ${DEFAULT_MANAGER_PASSWORD:-}
      DEFAULT_STAFF_PASSWORD: ${DEFAULT_STAFF_PASSWORD:-}
      DEFAULT_VIEWER_PASSWORD: ${DEFAULT_VIEWER_PASSWORD:-}
      # Pipeline project root (scripts, output, env files)
      PIPELINE_PROJECT_ROOT: /app
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8050,https://mhn.realtrackapp.com,http://mhn.realtrackapp.com}
      # Frontend base URL (used for OAuth redirect back)
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-}
      # OpenRouter AI (OpenAI-compatible API)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-minimax/minimax-m3}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-minimax/minimax-m3}
      OPENAI_LISTING_MODEL: ${OPENAI_LISTING_MODEL:-minimax/minimax-m3}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_MODEL_DEFAULT: ${OPENAI_MODEL_DEFAULT:-openai/gpt-4.1-mini}
      OPENAI_MODEL_FLAGSHIP: ${OPENAI_MODEL_FLAGSHIP:-google/gemini-2.5-flash}
      OPENAI_MODEL_BULK: ${OPENAI_MODEL_BULK:-deepseek/deepseek-chat-v3-0324}
      OPENAI_MODEL_TEXT: ${OPENAI_MODEL_TEXT:-openai/gpt-4o-mini}
      OPENAI_MODEL_ESCALATION: ${OPENAI_MODEL_ESCALATION:-google/gemini-2.5-flash}
      OPENAI_MODEL_FLAGSHIP_MIN_PRICE: ${OPENAI_MODEL_FLAGSHIP_MIN_PRICE:-200}
      AI_FITMENT_MIN_ROWS: ${AI_FITMENT_MIN_ROWS:-5}
      AI_AUTO_APPROVE_MIN_SCORE: ${AI_AUTO_APPROVE_MIN_SCORE:-85}
      AI_ROUTING_POLICY_PATH: ${AI_ROUTING_POLICY_PATH:-/app/config/ai-routing-policy.json}
      AI_OPTIMIZER_ENABLED: ${AI_OPTIMIZER_ENABLED:-false}
      AI_OPTIMIZER_CANARY_PERCENT: ${AI_OPTIMIZER_CANARY_PERCENT:-10}
      AI_LEARNING_MIN_SAMPLES: ${AI_LEARNING_MIN_SAMPLES:-20}
      AI_PROMPT_VERSION: ${AI_PROMPT_VERSION:-enrichment-v1}
      AI_RUN_MODE: ${AI_RUN_MODE:-default}
      AI_TAXONOMY_VALIDATION_ENABLED: ${AI_TAXONOMY_VALIDATION_ENABLED:-true}
      RBAC_SYNC_PERMISSIONS: ${RBAC_SYNC_PERMISSIONS:-true}
      # Pipeline / catalog import (t3.medium defaults — override in .env)
      PIPELINE_AI_CONCURRENCY: ${PIPELINE_AI_CONCURRENCY:-3}
      PIPELINE_AI_BATCH_SIZE: ${PIPELINE_AI_BATCH_SIZE:-6}
      PIPELINE_LOCALIZATION_CONCURRENCY: ${PIPELINE_LOCALIZATION_CONCURRENCY:-3}
      PIPELINE_IMAGE_CONCURRENCY: ${PIPELINE_IMAGE_CONCURRENCY:-3}
      PIPELINE_CATEGORY_CONCURRENCY: ${PIPELINE_CATEGORY_CONCURRENCY:-2}
      PIPELINE_VIN_BATCH_CONCURRENCY: ${PIPELINE_VIN_BATCH_CONCURRENCY:-3}
      PIPELINE_IMAGE_SKU_CONCURRENCY: ${PIPELINE_IMAGE_SKU_CONCURRENCY:-2}
      PIPELINE_FAST_MODE: ${PIPELINE_FAST_MODE:-0}
      PIPELINE_LOCALIZATION_MODE: ${PIPELINE_LOCALIZATION_MODE:-copy}
      PIPELINE_LOCALIZATION_MODEL: ${PIPELINE_LOCALIZATION_MODEL:-openai/gpt-4o-mini}
      PIPELINE_LOCALIZATION_BATCH_SIZE: ${PIPELINE_LOCALIZATION_BATCH_SIZE:-8}
      PIPELINE_SKIP_IMAGE_VALIDATION: ${PIPELINE_SKIP_IMAGE_VALIDATION:-true}
      PIPELINE_MIRROR_IMAGES: ${PIPELINE_MIRROR_IMAGES:-true}
      PIPELINE_SKIP_MVL_ON_IMPORT: ${PIPELINE_SKIP_MVL_ON_IMPORT:-true}
      PIPELINE_EXPORT_MAX_FITMENT_ROWS: ${PIPELINE_EXPORT_MAX_FITMENT_ROWS:-80}
      PIPELINE_DESC_MAX_FITMENT_ROWS: ${PIPELINE_DESC_MAX_FITMENT_ROWS:-30}
      PIPELINE_CATEGORY_MODE: ${PIPELINE_CATEGORY_MODE:-auto}
      PIPELINE_CATEGORY_AI_MODEL: ${PIPELINE_CATEGORY_AI_MODEL:-openai/gpt-4o-mini}
      PIPELINE_CATEGORY_AI_BATCH_SIZE: ${PIPELINE_CATEGORY_AI_BATCH_SIZE:-12}
      MAX_CONCURRENT_PIPELINE_JOBS: ${MAX_CONCURRENT_PIPELINE_JOBS:-2}
      PIPELINE_JOB_STALE_MINUTES: ${PIPELINE_JOB_STALE_MINUTES:-360}
      CATALOG_IMPORT_EBAY_BROWSE_CONCURRENCY: ${CATALOG_IMPORT_EBAY_BROWSE_CONCURRENCY:-2}
      CATALOG_IMPORT_IMAGE_SKU_CONCURRENCY: ${CATALOG_IMPORT_IMAGE_SKU_CONCURRENCY:-2}
      # eBay
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_DEV_ID: ${EBAY_DEV_ID:-}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-SANDBOX}
      EBAY_REDIRECT_URI: ${EBAY_REDIRECT_URI:-}
      # SellerPundit (optional eBay connection source — set in project root .env)
      SELLERPUNDIT_API_BASE_URL: ${SELLERPUNDIT_API_BASE_URL:-https://authentication.sellerpundit.com/api/v1}
      SELLERPUNDIT_MARKETPLACES_URL: ${SELLERPUNDIT_MARKETPLACES_URL:-https://marketplaces.sellerpundit.com}
      SELLERPUNDIT_EMAIL: ${SELLERPUNDIT_EMAIL:-}
      SELLERPUNDIT_PASSWORD: ${SELLERPUNDIT_PASSWORD:-}
      SELLERPUNDIT_ENVIRONMENT: ${SELLERPUNDIT_ENVIRONMENT:-production}
      SELLERPUNDIT_DEFAULT_MARKETPLACE_ID: ${SELLERPUNDIT_DEFAULT_MARKETPLACE_ID:-EBAY_MOTORS_US}
      SELLERPUNDIT_POLICY_SYNC_MAX_AGE_HOURS: ${SELLERPUNDIT_POLICY_SYNC_MAX_AGE_HOURS:-24}
      # S3 / Storage (s3://solarrisebackupbucket/mhn/ — set bucket + prefix in .env)
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-${S3_BUCKET:-}}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-${S3_PREFIX:-}}
      AWS_S3_REGION: ${AWS_S3_REGION:-${S3_REGION:-us-east-1}}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads:/app/uploads
      - ./scripts:/app/scripts:ro
      - ./output:/app/output
      - ./config:/app/config
      - ./docs:/app/docs:ro
      # Optional: project env for pipeline child process (OpenRouter, eBay, AI routing)
      - ./.env:/app/.env:ro
      - ./eBay-parts-and-accs-listing-template-Mar-28-2026-19-33-14.xlsx:/app/eBay-parts-and-accs-listing-template-Mar-28-2026-19-33-14.xlsx:ro
      - ./eBay-category-listing-template-Mar-28-2026-19-39-50.xlsx:/app/eBay-category-listing-template-Mar-28-2026-19-39-50.xlsx:ro
      - ./eBay-category-listing-template-Mar-28-2026-19-43-18.xlsx:/app/eBay-category-listing-template-Mar-28-2026-19-43-18.xlsx:ro
    ports:
      - "${BACKEND_PORT_EXTERNAL:-4191}:4191"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4191/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s

  # ── Vite Frontend → Nginx ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8050}:80"

volumes:
  pgdata:
  redisdata:
  uploads:
