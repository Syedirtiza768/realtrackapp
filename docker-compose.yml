# ───────────────────────────────────────────────────────────────
# RealTrackApp — Docker Compose
# ───────────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env          # fill in your secrets
#   docker compose up -d --build  # build & start all services
#   docker compose logs -f        # follow logs
# ───────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-listingpro}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-listingpro}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4191
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-listingpro}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      DB_MIGRATIONS_RUN: ${DB_MIGRATIONS_RUN:-false}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_MIN: ${DB_POOL_MIN:-5}
      DB_LOGGING: ${DB_LOGGING:-false}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8050}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # eBay
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_DEV_ID: ${EBAY_DEV_ID:-}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-SANDBOX}
      EBAY_REDIRECT_URI: ${EBAY_REDIRECT_URI:-}
      # S3 / Storage
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - uploads:/app/uploads
    ports:
      - "${BACKEND_PORT_EXTERNAL:-4191}:4191"

  # ── Vite Frontend → Nginx ──────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8050}:80"

volumes:
  pgdata:
  redisdata:
  uploads:
